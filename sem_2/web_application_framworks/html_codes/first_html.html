<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML,CSS AND JS EXAMPLE</title>

    <style>
        body {text-align: center; background-color: #eef;}
        h2 {color: darkblue;}
        button {padding: 10px 20px; background-color: blue; color: white;
        border: none; cursor: pointer;}

        #outer_para {
            size: 20px;
            color: aqua;
        }
        
    </style>

    <script>
        function showmessage(){
            alert("this is a javascript interactivity");
        }
    </script>
</head>
<body>
    <h2>welcome to my webpage</h2>
    <p id="outer_para">this structure is build using HTML,CSS AND JS </p>
    <button onclick="showmessage()">Click Me</button>
</body>
</html>
