<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Defines character encoding -->
    <meta charset="UTF-8">

    <!-- Makes website responsive on all devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Title shown in browser tab -->
    <title>Starting JavaScript Display Method</title>
</head>
<body>

    <!-- Heading -->
    <h2>JavaScript Display Method Demo</h2>

    <!-- Empty paragraph where JS will insert content -->
    <p id="demo"></p>

    <script>
        // ===============================
        // 1. Writing into an HTML element
        // ===============================
        // Selects element with id="demo"
        // and replaces its content using innerHTML
        document.getElementById("demo").innerHTML = "Hello using innerHTML";


        // ===============================
        // 2. document.write()
        // ===============================
        // Writes directly to the HTML document
        // WARNING:
        // If used after page loads, it will overwrite the entire page
        document.write("Hello using document.write");


        // ===============================
        // 3. alert()
        // ===============================
        // Displays a popup alert box in browser
        // Used mainly for debugging or simple notifications
        window.alert("Hello using alert box");


        // ===============================
        // 4. console.log()
        // ===============================
        // Prints output in browser console (Inspect → Console)
        // Used by developers for debugging
        console.log("Hello using console.log");

    </script>

</body>
</html>
