 <!-- 📌 WHAT THE QUESTION IS ASKING

You need to build:

👉 HTML + JavaScript program
👉 That takes SRN input from user
👉 And validates it using rules

🧠 🔹 PART (a) — SRN VALIDATION
📌 Given Example:
PES1PG24CA221
🔥 REQUIRED FORMAT (VERY IMPORTANT)
3 letters + 1 digit + 2 letters + 2 digits + 2 letters + 3 digits
✅ Break it properly:
Part	Meaning	Example
3 letters	uppercase only	PES
1 digit	number	1
2 letters	uppercase	PG
2 digits	number	24
2 letters	uppercase	CA
3 digits	number	221
🧠 FINAL PATTERN
PES1PG24CA221
🔥 REGEX FOR THIS
/^[A-Z]{3}[0-9]{1}[A-Z]{2}[0-9]{2}[A-Z]{2}[0-9]{3}$/
🔍 Meaning
Part	Meaning
^	start
[A-Z]{3}	3 uppercase letters
[0-9]{1}	1 digit
[A-Z]{2}	2 letters
[0-9]{2}	2 digits
[A-Z]{2}	2 letters
[0-9]{3}	3 digits
$	end
⚠️ CONDITIONS
✔ No spaces allowed
✔ Only uppercase letters
✔ Exact format
🧠 🔹 WHAT YOU MUST IMPLEMENT
1️⃣ HTML Form

👉 Input field for SRN

2️⃣ Event Handler

👉 When user submits → validate

Example:

onsubmit="validateSRN()"
3️⃣ JavaScript Validation

👉 Check using regex

4️⃣ Error Messages

👉 Use:

alert("Error message");
🧠 🔹 PART (b) — SEMESTER INPUT
📌 Requirement:

👉 Take semester input

Allowed values: 1 to 4
✅ Validation:
if(sem < 1 || sem > 4){
   alert("Invalid semester");
}
🧠 🔥 COMPLETE WORKFLOW
User enters:
SRN + Semester

↓
Click submit

↓
JS checks:
✔ SRN format correct?
✔ No spaces?
✔ Uppercase only?
✔ Semester between 1–4?

↓
If error → alert
If correct → success message -->


<!-- ----------------------------------------- code ------------------------------------- -->
 <!DOCTYPE html>
<html>
<head>
    <title>SRN Validation</title>
</head>
<body>

<h2>Enter SRN and Semester</h2>

<form onsubmit="return validate()">

    SRN: <input type="text" id="srn"><br><br>

    Semester: <input type="number" id="sem"><br><br>

    <input type="submit" value="Submit">

</form>
<script>
    
function validate(){

    let srn = document.getElementById("srn").value;
    let sem = document.getElementById("sem").value;

    let pattern = /^[A-Z]{3}[0-9]{1}[A-Z]{2}[0-9]{2}[A-Z]{2}[0-9]{3}$/;

    // SRN validation
    if(srn === ""){
        alert("SRN cannot be empty");
        return false;
    }

    if(!pattern.test(srn)){
        alert("Invalid SRN format");
        return false;
    }

    // Semester validation
    if(sem < 1 || sem > 4){
        alert("Semester must be between 1 and 4");
        return false;
    }

    alert("Valid Input ✅");
    return true;
}

</script>
</body>
</html>
