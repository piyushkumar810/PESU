<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login System</title>
    <style>
        body {
            font-family: Arial;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
            width: 300px;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 10px 20px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        #message {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Login</h2>
    
    <input type="text" id="username" placeholder="Enter Username"><br>
    <input type="password" id="password" placeholder="Enter Password"><br>
    
    <button onclick="login()">Login</button>

    <p id="message"></p>
</div>

<script>
    function login() {
        // predefined credentials
        let correctUser = "piyushkumarpesu810@gmail.com";
        let correctPass = "PES1PG25CA150";

        // get input values
        let user = document.getElementById("username").value;
        let pass = document.getElementById("password").value;
        let message = document.getElementById("message");

        // validation
        if (user === correctUser && pass === correctPass) {
            message.style.color = "green";
            message.innerText = "✅ Login Successful!";
        } else {
            alert("❌ Invalid Credentials!");
            message.style.color = "red";
            message.innerText = "Login Failed!";
        }
    }
</script>

</body>
</html>
