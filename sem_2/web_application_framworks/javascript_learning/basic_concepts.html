<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
    // ===============================
    // 1. VARIABLES & SCOPE
    // ===============================
    
    var a = 10;       // global
    b = 20;           // implicit global (danger)
    
    function scopeTest(){
        var x = 5;    // local
        y = 15;       // global (no var)
    }
    scopeTest();
    
    console.log("Scope Test:");
    console.log("b =", b); // 20
    console.log("y =", y); // 15
    // console.log(x); ❌ error (local)
    
    
    // ===============================
    // 2. OPERATORS & ASSOCIATIVITY
    // ===============================
    
    console.log("\nOperators:");
    
    console.log("5 * 2 + 1 =", 5 * 2 + 1); // 11
    console.log("12 / 6 / 2 =", 12 / 6 / 2); // 1
    
    
    // ===============================
    // 3. INCREMENT / DECREMENT
    // ===============================
    
    let i = 5;
    
    console.log("\nIncrement:");
    
    console.log("++i =", ++i); // 6
    i = 5;
    console.log("i++ =", i++); // 5
    console.log("after i++ =", i); // 6
    
    
    // ===============================
    // 4. TYPE CONVERSION
    // ===============================
    
    console.log("\nType Conversion:");
    
    console.log('"3"+"4" =', "3" + "4"); // "34"
    console.log('3+4+"x" =', 3 + 4 + "x"); // "7x"
    console.log('"x"+3+4 =', "x" + 3 + 4); // "x34"
    
    console.log('parseInt("34xyz") =', parseInt("34xyz")); // 34
    console.log('parseFloat("3.4xyz") =', parseFloat("3.4xyz")); // 3.4
    console.log('parseInt("xyz34") =', parseInt("xyz34")); // NaN
    
    
    // ===============================
    // 5. NaN CHECK
    // ===============================
    
    let val = parseInt("abc");
    console.log("\nNaN Check:");
    console.log("isNaN(val) =", isNaN(val)); // true
    
    
    // ===============================
    // 6. MATH OBJECT
    // ===============================
    
    console.log("\nMath Functions:");
    
    console.log("floor(4.7) =", Math.floor(4.7)); // 4
    console.log("ceil(4.1) =", Math.ceil(4.1)); // 5
    console.log("round(4.5) =", Math.round(4.5)); // 5
    
    console.log("floor(-4.1) =", Math.floor(-4.1)); // -5
    console.log("ceil(-4.1) =", Math.ceil(-4.1)); // -4
    
    console.log("pow(2,3) =", Math.pow(2,3)); // 8
    console.log("sqrt(64) =", Math.sqrt(64)); // 8
    console.log("abs(-5) =", Math.abs(-5)); // 5
    
    console.log("PI =", Math.PI);
    
    console.log("Random (0-9):", Math.floor(Math.random()*10));
    
    
    // ===============================
    // 7. ARRAYS
    // ===============================
    
    console.log("\nArrays:");
    
    let arr = [10, 2, 1];
    
    arr.push(5);
    console.log("Array:", arr);
    
    arr.sort();
    console.log("Sorted (trap):", arr); // [1,10,2,5]
    
    
    // ===============================
    // 8. FUNCTIONS
    // ===============================
    
    function add(a, b){
        return a + b;
    }
    
    console.log("\nFunctions:");
    console.log("add(2,3) =", add(2,3));
    
    
    // ===============================
    // 9. CONDITIONS
    // ===============================
    
    console.log("\nConditions:");
    
    let num = 7;
    
    if(num > 5){
        console.log("Greater than 5");
    }else{
        console.log("Less or equal to 5");
    }
    
    
    // ===============================
    // 10. LOOPS
    // ===============================
    
    console.log("\nLoop:");
    
    for(let j = 1; j <= 3; j++){
        console.log("j =", j);
    }
    
    
    // ===============================
    // 11. LOGICAL OPERATORS
    // ===============================
    
    console.log("\nLogical:");
    
    console.log(true && false); // false
    console.log(true || false); // true
    console.log(!true); // false
    
    
    // ===============================
    // 12. COMPARISON OPERATORS
    // ===============================
    
    console.log("\nComparison:");
    
    console.log("5 == '5' =", 5 == "5");   // true
    console.log("5 === '5' =", 5 === "5"); // false
    
    
    // ===============================
    // 13. OBJECTS
    // ===============================
    
    console.log("\nObjects:");
    
    let person = {
        name: "John",
        age: 20
    };
    
    console.log(person.name);
    
    
    // ===============================
    // 14. FINAL TRICKY EXPRESSIONS
    // ===============================
    
    console.log("\nTricky:");
    
    let t = 5;
    console.log("t++ + ++t =", t++ + ++t); // tricky
    </script>
</body>
</html>
