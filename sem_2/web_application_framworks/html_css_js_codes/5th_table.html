<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A sample table</title>
</head>
<body>
    <table border="10" cellspacing="10" cellpadding="10" align="center">
        <caption>Fruit Juice Drinks</caption>

        <tr>
            <th></th>
            <th>Apple</th>
            <th>Orange</th>
            <th>Banana</th>
        </tr>

        <tr>
            <th>Breakfast</th>
            <td>0</td>
            <td>1</td>
            <td>0</td>
        </tr>

        <tr>
            <th>Lunch</th>
            <td>1</td>
            <td>0</td>
            <td>0</td>
        </tr>

        <tr>
            <th>Dinner</th>
            <td>0</td>
            <td>0</td>
            <td>1</td>
        </tr>
    </table>
</body>
</html>
