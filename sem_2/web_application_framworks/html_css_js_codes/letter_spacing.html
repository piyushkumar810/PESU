<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>text spacing</title>
    <style type="text/css">
        p.bigtracking{letter-spacing: 0.4em;}
        p.smalltracking{letter-spacing: -0.8em;}
        p.bigbetweenwords{word-spacing: 0.4em;}
        p.bigleading{line-height: 2.5;}
        p.smallleading{line-height: 1.0;}
    </style>
</head>
<body>
    <p class="bigtracking">Lorem ipsum dolor sit amet consectetur adipisicing elit. Id tempore magni vero soluta, ipsam dicta hic illum, optio quibusdam qui nobis.</p>
</body>
</html>
