<!DOCTYPE html>
<html>
<head>
    <title>HTML Multimedia Example</title>
</head>

<body>

    <h1 align="center">HTML Multimedia Example</h1>

    <hr>

    <!-- Image -->

    <h2>1. Image</h2>

    <img
        src="https://www.w3schools.com/html/pic_trulli.jpg"
        alt="Sample Image"
        width="400"
        height="250"
        border="2">

    <hr>

    <!-- Audio -->

    <h2>2. Audio</h2>

    <audio controls autoplay muted loop preload="auto">

        <source src="https://www.w3schools.com/html/horse.mp3"
                type="audio/mpeg">

        Your browser does not support Audio.

    </audio>

    <hr>

    <!-- Video -->

    <h2>3. Video</h2>

    <video
        width="500"
        height="300"
        controls
        autoplay
        muted
        loop
        poster="https://www.w3schools.com/html/img_girl.jpg">

        <source
            src="https://www.w3schools.com/html/mov_bbb.mp4"
            type="video/mp4">

        Your browser does not support Video.

    </video>

    <hr>

    <!-- YouTube Video -->

    <h2>4. YouTube Video</h2>

    <iframe
        width="560"
        height="315"
        src="https://www.youtube.com/embed/tgbNymZ7vqY"
        title="YouTube video"
        frameborder="0"
        allowfullscreen>
    </iframe>

    <hr>

    <!-- Download Link -->

    <h2>5. Download Audio</h2>

    <a href="https://www.w3schools.com/html/horse.mp3"
       download>

       Download Audio File

    </a>

    <hr>

    <!-- Download Video -->

    <h2>6. Download Video</h2>

    <a href="https://www.w3schools.com/html/mov_bbb.mp4"
       download>

       Download Video File

    </a>

</body>
</html>
