<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Displaying message by clicking</title>
</head>
<body>
    <form action="">
        Enter 1st message: <input type="text" name="t1" id="T1">
        <br>
        Enter 2st message: <input type="text" name="t1" id="T2">
        <br>

        <input type="button" value="show" onclick="display()">
    </form>

    <p id="T3"></p>

    <script>
        function display(){
            var m=document.getElementById("T1").value;
            var n=document.getElementById("T2").value;
            document.getElementById("T3").innerHTML="message is: "+m +" "+n;
        }
    </script>
</body>
</html>
