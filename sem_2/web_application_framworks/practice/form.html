<!DOCTYPE html>
<html>
<head>
    <title>HTML Form Example</title>
</head>

<body>

<h2 align="center">Student Registration Form</h2>

<form action="success.html" method="post">

    <fieldset>

        <legend><b>Personal Information</b></legend>

        <!-- Name -->
        <label>Name :</label>
        <input type="text"
               name="name"
               placeholder="Enter your name"
               required>
        <br><br>

        <!-- Password -->
        <label>Password :</label>
        <input type="password"
               name="password"
               minlength="8"
               required>
        <br><br>

        <!-- Email -->
        <label>Email :</label>
        <input type="email"
               name="email"
               placeholder="abc@gmail.com">
        <br><br>

        <!-- Age -->
        <label>Age :</label>
        <input type="number"
               name="age"
               min="18"
               max="60">
        <br><br>

        <!-- Mobile -->
        <label>Mobile :</label>
        <input type="tel"
               name="mobile"
               maxlength="10">
        <br><br>

        <!-- Date -->
        <label>Date of Birth :</label>
        <input type="date">
        <br><br>

        <!-- Gender -->
        <label>Gender :</label>

        <input type="radio"
               name="gender"
               value="Male"> Male

        <input type="radio"
               name="gender"
               value="Female"> Female

        <input type="radio"
               name="gender"
               value="Other"> Other

        <br><br>

        <!-- Hobbies -->
        <label>Hobbies :</label>

        <input type="checkbox"
               value="Cricket"> Cricket

        <input type="checkbox"
               value="Music"> Music

        <input type="checkbox"
               value="Reading"> Reading

        <br><br>

        <!-- Course -->
        <label>Course :</label>

        <select>

            <option>BCA</option>
            <option>MCA</option>
            <option>B.Tech</option>
            <option>M.Tech</option>

        </select>

        <br><br>

        <!-- Address -->
        <label>Address :</label>

        <textarea rows="4"
                  cols="30"
                  placeholder="Enter Address"></textarea>

        <br><br>

        <!-- File Upload -->
        <label>Upload Resume :</label>

        <input type="file">

        <br><br>

        <!-- Color -->
        <label>Favourite Color :</label>

        <input type="color">

        <br><br>

        <!-- Range -->
        <label>Experience :</label>

        <input type="range"
               min="0"
               max="10">

        <br><br>

        <!-- Buttons -->

        <input type="submit" value="Register">

        <input type="reset" value="Clear">

    </fieldset>

</form>

</body>
</html>
