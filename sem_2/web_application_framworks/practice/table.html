<!DOCTYPE html>
<html>
<head>
    <title>HTML Table Example</title>
</head>

<body>

<h2 align="center">Student Information</h2>

<table border="2"
       cellpadding="10"
       cellspacing="5"
       width="70%"
       align="center">

    <!-- Table Caption -->
    <caption>
        <b>Student Details Table</b>
    </caption>

    <!-- Heading Row -->
    <tr bgcolor="lightblue">
        <th>SR No</th>
        <th>Name</th>
        <th>Age</th>
        <th>Email</th>
        <th>Course</th>
    </tr>

    <!-- Row 1 -->
    <tr align="center">
        <td>1</td>
        <td>Piyush</td>
        <td>22</td>
        <td>piyush@gmail.com</td>
        <td>MCA</td>
    </tr>

    <!-- Row 2 -->
    <tr align="center">
        <td>2</td>
        <td>Rahul</td>
        <td>21</td>
        <td>rahul@gmail.com</td>
        <td>MCA</td>
    </tr>

    <!-- Row 3 (Using Colspan) -->
    <tr align="center">
        <td colspan="5" bgcolor="yellow">
            All Students Belong to PES University
        </td>
    </tr>

    <!-- Row 4 (Using Rowspan) -->
    <tr align="center">
        <td rowspan="2">3</td>
        <td>Aman</td>
        <td>23</td>
        <td>aman@gmail.com</td>
        <td>MCA</td>
    </tr>

    <tr align="center">
        <td>Extra Activity</td>
        <td colspan="3">
            Cricket Team Captain
        </td>
    </tr>

</table>

</body>
</html>
